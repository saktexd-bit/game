<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VN Runner X</title>

<style>
body{margin:0;overflow:hidden;background:#000;font-family:sans-serif}
#hud{position:absolute;top:10px;left:10px;color:#fff;z-index:5}
#score{font-size:22px;transition:.15s}
#combo{color:#0ff}
#center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
color:#fff;font-size:22px;display:none}
</style>
</head>
<body>

<div id="hud">
Score: <span id="score">0</span><br>
Combo: <span id="combo">0</span>
</div>

<div id="center"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/postprocessing/UnrealBloomPass.js"></script>

<script>
// ===== SCENE =====
let scene=new THREE.Scene();
scene.background=new THREE.Color(0x87ceeb);

let camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
camera.position.set(0,5,10);

let renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(Math.min(1.5,devicePixelRatio));
document.body.appendChild(renderer.domElement);

// ===== POST (BLOOM) =====
let composer=new THREE.EffectComposer(renderer);
composer.addPass(new THREE.RenderPass(scene,camera));
let bloom=new THREE.UnrealBloomPass(
 new THREE.Vector2(innerWidth,innerHeight),0.6,0.4,0.8
);
composer.addPass(bloom);

// ===== LIGHT =====
scene.add(new THREE.HemisphereLight(0xffffff,0x444444,1.2));
let dir=new THREE.DirectionalLight(0xffffff,1);
dir.position.set(5,10,7);
scene.add(dir);

// ===== ROAD + RAIL =====
let tex=new THREE.TextureLoader().load(
 "https://threejs.org/examples/textures/brick_diffuse.jpg"
);
let road=new THREE.Mesh(
 new THREE.PlaneGeometry(12,600),
 new THREE.MeshStandardMaterial({map:tex})
);
road.rotation.x=-Math.PI/2;
scene.add(road);

[-2,0,2].forEach(x=>{
 let rail=new THREE.Mesh(
  new THREE.BoxGeometry(0.3,0.1,600),
  new THREE.MeshStandardMaterial({color:0x555555})
 );
 rail.position.set(x,0,0);
 scene.add(rail);
});

// ===== PLAYER =====
let player,mixer;
let loader=new THREE.GLTFLoader();

loader.load(
"https://threejs.org/examples/models/gltf/Soldier.glb",
(gltf)=>{
 player=gltf.scene;
 player.scale.set(1.5,1.5,1.5);
 scene.add(player);

 mixer=new THREE.AnimationMixer(player);
 mixer.clipAction(gltf.animations[0]).play();
});

// ===== CONTROL =====
let lane=0,targetX=0;
let jumping=false, sliding=false, yVel=0;

function setLane(v){ lane=Math.max(-1,Math.min(1,v)); }

document.addEventListener("keydown",e=>{
 if(e.key==="ArrowLeft") setLane(lane-1);
 if(e.key==="ArrowRight") setLane(lane+1);
 if(e.key==="ArrowUp" && !jumping){
   jumping=true; yVel=0.22;
 }
 if(e.key==="ArrowDown" && !sliding){
   sliding=true;
   setTimeout(()=>sliding=false,500);
 }
});

// mobile swipe
let sx=0,sy=0;
document.addEventListener("touchstart",e=>{
 sx=e.touches[0].clientX; sy=e.touches[0].clientY;
});
document.addEventListener("touchend",e=>{
 let dx=e.changedTouches[0].clientX-sx;
 let dy=e.changedTouches[0].clientY-sy;
 if(Math.abs(dx)>Math.abs(dy)){
  if(dx>40) setLane(lane+1);
  if(dx<-40) setLane(lane-1);
 }else{
  if(dy<-40 && !jumping){ jumping=true; yVel=0.22; }
  if(dy>40 && !sliding){ sliding=true; setTimeout(()=>sliding=false,500); }
 }
});

// ===== COIN =====
let coins=[];
function spawnCoin(){
 let x=[-2,0,2][Math.floor(Math.random()*3)];
 let coin=new THREE.Mesh(
  new THREE.CylinderGeometry(0.5,0.5,0.1,32),
  new THREE.MeshStandardMaterial({color:0xffd700})
 );
 coin.rotation.x=Math.PI/2;
 coin.position.set(x,1,-60);
 scene.add(coin);
 coins.push(coin);
}

// ===== OBSTACLE =====
let obs=[];
function spawnObs(){
 let x=[-2,0,2][Math.floor(Math.random()*3)];
 let o=new THREE.Mesh(
  new THREE.BoxGeometry(1,1,1),
  new THREE.MeshStandardMaterial({color:0xff0040})
 );
 o.position.set(x,0,-60);
 scene.add(o);
 obs.push(o);
}

// ===== GAME =====
let score=0, combo=0;
let clock=new THREE.Clock();

function pop(){
 let el=document.getElementById("score");
 el.style.transform="scale(1.4)";
 setTimeout(()=>el.style.transform="scale(1)",120);
}

function gameOver(){
 let c=document.getElementById("center");
 c.innerText="GAME OVER";
 c.style.display="block";
 setTimeout(()=>location.reload(),1500);
}

// ===== LOOP =====
function animate(){
 requestAnimationFrame(animate);
 let dt=clock.getDelta();

 if(mixer) mixer.update(dt);

 // lane lerp
 targetX=lane*2;
 if(player) player.position.x += (targetX-player.position.x)*0.2;

 // jump physics
 if(jumping && player){
   player.position.y += yVel;
   yVel -= 0.01;
   if(player.position.y<=0){
     player.position.y=0;
     jumping=false;
   }
 }

 // coins
 coins.forEach((c,i)=>{
  c.position.z+=0.9;
  c.rotation.z+=0.15;

  if(player && Math.abs(c.position.z-player.position.z)<1 &&
     Math.abs(c.position.x-player.position.x)<1){
    scene.remove(c);
    coins.splice(i,1);
    score+=10; combo++;
    pop();
  }
 });

 // obstacles
 obs.forEach((o,i)=>{
  o.position.z+=0.9;

  if(player && Math.abs(o.position.z-player.position.z)<1 &&
     Math.abs(o.position.x-player.position.x)<1){
    gameOver();
  }

  if(o.position.z>5){
    scene.remove(o);
    obs.splice(i,1);
  }
 });

 if(Math.random()<0.05) spawnCoin();
 if(Math.random()<0.03) spawnObs();

 document.getElementById("score").innerText=score;
 document.getElementById("combo").innerText=combo;

 composer.render();
}
animate();
</script>
</body>
</html>

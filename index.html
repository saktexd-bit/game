<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VN Runner PRO</title>

<style>
body{margin:0;overflow:hidden;background:#000;font-family:sans-serif}
#hud{position:absolute;top:10px;left:10px;color:#fff}
#score{font-size:22px;transition:0.2s}
#combo{color:#0ff}
</style>
</head>
<body>

<div id="hud">
Score: <span id="score">0</span><br>
Combo: <span id="combo">0</span>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/postprocessing/UnrealBloomPass.js"></script>

<script>
// ===== SCENE =====
let scene=new THREE.Scene();
scene.background=new THREE.Color(0x87ceeb);

let camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
camera.position.set(0,5,10);

let renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

// ===== POST PROCESS (BLOOM) =====
let composer=new THREE.EffectComposer(renderer);
composer.addPass(new THREE.RenderPass(scene,camera));

let bloom=new THREE.UnrealBloomPass(
 new THREE.Vector2(innerWidth,innerHeight),
 0.6,0.4,0.8
);
composer.addPass(bloom);

// ===== LIGHT =====
let hemi=new THREE.HemisphereLight(0xffffff,0x444444,1.2);
scene.add(hemi);

// ===== TEXTURE ROAD =====
let tex=new THREE.TextureLoader().load(
 "https://threejs.org/examples/textures/brick_diffuse.jpg"
);

let road=new THREE.Mesh(
 new THREE.PlaneGeometry(12,500),
 new THREE.MeshStandardMaterial({map:tex})
);
road.rotation.x=-Math.PI/2;
scene.add(road);

// ===== RAIL =====
[-2,0,2].forEach(x=>{
 let rail=new THREE.Mesh(
  new THREE.BoxGeometry(0.3,0.1,500),
  new THREE.MeshStandardMaterial({color:0x555555})
 );
 rail.position.set(x,0,0);
 scene.add(rail);
});

// ===== VN BUILDING + SIGN =====
function sign(text,x,z){
 let c=document.createElement("canvas");
 c.width=256;c.height=128;
 let ctx=c.getContext("2d");
 ctx.fillStyle="#000";ctx.fillRect(0,0,256,128);
 ctx.fillStyle="#0ff";ctx.font="22px Arial";
 ctx.fillText(text,20,70);

 let tex=new THREE.CanvasTexture(c);
 let m=new THREE.MeshBasicMaterial({map:tex});
 let s=new THREE.Mesh(new THREE.PlaneGeometry(2,1),m);
 s.position.set(x,3,z);
 scene.add(s);
}

["PHO","CAFE","TRA SUA","AN VAT"].forEach((t,i)=>{
 sign(t, i%2?6:-6, -i*10);
});

// ===== PLAYER MIXAMO =====
let player,mixer,actions={},current;
let loader=new THREE.GLTFLoader();

loader.load("https://threejs.org/examples/models/gltf/Soldier.glb",(gltf)=>{
 player=gltf.scene;
 player.scale.set(1.5,1.5,1.5);
 scene.add(player);

 mixer=new THREE.AnimationMixer(player);
 gltf.animations.forEach(a=>{
  actions[a.name]=mixer.clipAction(a);
 });

 play("Idle");
});

function play(name){
 if(!actions[name]) return;
 let next=actions[name];
 if(current!==next){
  current?.fadeOut(0.2);
  next.reset().fadeIn(0.2).play();
  current=next;
 }
}

// ===== CONTROL =====
let lane=0;
document.addEventListener("keydown",e=>{
 if(e.key==="ArrowLeft") lane=Math.max(-1,lane-1);
 if(e.key==="ArrowRight") lane=Math.min(1,lane+1);

 if(e.key==="ArrowUp"){
  play("Jump");
  setTimeout(()=>play("Idle"),500);
 }
});

// ===== COIN =====
let coins=[];
function spawnCoin(){
 let coin=new THREE.Mesh(
  new THREE.CylinderGeometry(0.5,0.5,0.1,32),
  new THREE.MeshStandardMaterial({color:0xffd700})
 );
 coin.rotation.x=Math.PI/2;
 coin.position.set(lane*2,1,-50);
 scene.add(coin);
 coins.push(coin);
}

// ===== GAME =====
let score=0,combo=0;

function animate(){
 requestAnimationFrame(animate);

 if(mixer) mixer.update(0.016);

 if(player){
  player.position.x += (lane*2 - player.position.x)*0.2;
 }

 coins.forEach((c,i)=>{
  c.position.z+=0.8;
  c.rotation.z+=0.1;

  if(player && Math.abs(c.position.z-player.position.z)<1 &&
     Math.abs(c.position.x-player.position.x)<1){
    scene.remove(c);
    coins.splice(i,1);
    score+=10;
    combo++;

    // UI POP
    let el=document.getElementById("score");
    el.style.transform="scale(1.4)";
    setTimeout(()=>el.style.transform="scale(1)",100);
  }
 });

 if(Math.random()<0.05) spawnCoin();

 document.getElementById("score").innerText=score;
 document.getElementById("combo").innerText=combo;

 composer.render();
}
animate();
</script>
</body>
</html>
